services:
  app:
    build: .
    ports:
      - "2999:2999"
    environment:
      - DATABASE_URL=postgresql://lit:lit_password@db:5432/litcoimbra
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:2999}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - ADMIN_NOTIFY_EMAIL=${ADMIN_NOTIFY_EMAIL:-}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_ENV=${NEXT_PUBLIC_SENTRY_ENV:-production}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=lit
      - POSTGRES_PASSWORD=lit_password
      - POSTGRES_DB=litcoimbra
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lit -d litcoimbra"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
